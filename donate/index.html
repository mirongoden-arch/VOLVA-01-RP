<script>
function redirectToDonate() {
    const account = document.getElementById('nickname');
    const sum = document.getElementById('money');
    const checkbox = document.querySelector('input[type="checkbox"]');

    if (!account || !sum) return false;

    if (account.value.trim() === '') {
        alert('Введіть ID гравця');
        return false;
    }

    if (sum.value === '' || Number(sum.value) <= 0) {
        alert('Введіть коректну суму');
        return false;
    }

    if (!checkbox.checked) {
        alert('Потрібно погодитись з договором оферти');
        return false;
    }

    window.open('https://donatello.to/beta-rp', '_blank');

    return false;
}
</script>
